<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Style Guide</title>
</head>
<body>
    <!-- Your content goes here -->

    <!-- Iframe Section -->
    <!-- Add a new line and a comment with text Iframe -->
    <section>
        <!-- Create a header with a level 2 heading -->
        <header>
            <h2>Iframe</h2>
        </header>
        <!-- Add a div containing an iframe with specified attributes -->
        <div>
            <iframe title="Holberton School" width="350" height="200" src="https://www.youtube.com/embed/41N6bKO-NVI" frameborder="0" allowfullscreen>
                <!-- Provide fallback text for browsers that do not support iframes -->
                Holberton Sally
            </iframe>
        </div>
    </section>
</body>
</html>
