<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Style Guide - Audio</title>
</head>
<body>
    <!-- Your content goes here -->

    <!-- Audio Section -->
    <!-- Add a new line and a comment with text Audio -->
    <section>
        <!-- Create a header with a level 2 heading -->
        <header>
            <h2>Audio</h2>
        </header>
        <!-- Add the audio element with specified attributes -->
        <audio controls>
            <source src="https://intranet-projects-files.s3.amazonaws.com/webstack/TroubleChapter8_64kb.mp3" type="audio/mpeg">
            <!-- Provide alternative text for browsers that don't support the audio element -->
            Sorry, your browser doesn't support the audio element.
        </audio>
    </section>
</body>
</html>
