<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Style Guide - Video</title>
</head>
<body>
    <!-- Your content goes here -->

    <!-- Video Section -->
    <!-- Add a new line and a comment with text Video -->
    <section>
        <!-- Create a header with a level 2 heading -->
        <header>
            <h2>Video</h2>
        </header>
        <!-- Add the video element with specified attributes -->
        <video controls loop poster="https://intranet-projects-files.s3.amazonaws.com/webstack/thumbnail.jpg">
            <source src="https://intranet-projects-files.s3.amazonaws.com/webstack/BigBuckBunny.mp4" type="video/mp4">
            <!-- Provide alternative text for browsers that don't support HTML5 video -->
            Sorry, your browser doesn't support HTML5 video.
        </video>
    </section>
</body>
</html>
